apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin
  namespace: {{.Values.metadata.namespace}}
spec:
  replicas: {{.Values.spec.replicas | default 1}}
  selector:
    matchLabels:
      app: httpbin
  template:
    metadata:
      labels:
        app: httpbin
    spec:
      containers:
        - name: httpbin
          image: {{.Values.image}}
          imagePullPolicy: Always
          ports:
            - containerPort: 80