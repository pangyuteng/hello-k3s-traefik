apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin
  namespace: {{.Value.metadata.namespace}}
spec:
  replicas: {{.Value.spec.replicas | default 1}}
  selector:
    matchLabels:
      app: httpbin
  template:
    metadata:
      labels:
        app: httpbin
    spec:
      containers:
        - name: httpbin
          image: {{.Value.image}}
          imagePullPolicy: Always
          ports:
            - containerPort: 80