apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: httpbin
  namespace: {{.Values.metadata.namespace}}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  rules:
  - http:
      paths:
      - path: {{.Values.ingress.path}}
        pathType: Prefix
        backend:
          service:
            name: httpbin
            port:
              number: 80